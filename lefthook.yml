# Lefthook configuration — fast pre-commit, slow pre-push.
# Philosophy (AGENTS.md § Verification stack): every gate is local;
# a commit that fails any step is blocked at the hook.
# Splitting into fast (< 20s) + slow (< 5min) lanes per §16.13.

min_version: 1.11.0

# ── Fast lane: runs on every commit attempt ────────────────────────────────
# Target: < 20s on changed packages only.
pre-commit:
  parallel: true
  commands:
    types:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck:affected
      stage_fixed: false
    lint:
      glob: "*.{ts,tsx,js,mjs,json,jsonc}"
      run: pnpm exec biome check --staged --no-errors-on-unmatched {staged_files}
      stage_fixed: false
    coherence:
      # Drift-prevention guard (continuation.md § Phase 3 kickoff #2).
      # Fails the commit on: section references missing, capability IDs
      # out of sync across Appendix A / registry / AuditEffect, numeric
      # constants referenced as literals instead of named imports, ADR
      # cross-refs missing, and the Web UI design-token sheets drifting
      # from their docs/brand/v2 SSOT (Check 9). The glob lists every input
      # a check reads, so editing EITHER the SSOT (docs/**) or the app copy
      # (apps/app/src/styles/**) triggers the byte-match — otherwise a
      # hand-edit of the copy alone, the exact drift the guard targets,
      # would slip past.
      glob: "{docs/**,packages/**,apps/app/src/styles/**,AGENTS.md}"
      run: pnpm coherence
    unit-affected:
      # Scope is narrowed at the workspace-filter level (pnpm -r --filter
      # "...[origin/main]") — run each affected package's full suite so
      # per-package coverage thresholds see every test. Passing vitest's
      # own `--changed` would mask coverage (unchanged files' tests
      # wouldn't execute even though `coverage.all: true` still counts
      # those files against the threshold).
      glob: "*.{ts,tsx}"
      run: pnpm test:affected
      stage_fixed: false

# ── Slow lane: runs on pre-push ────────────────────────────────────────────
# Full verification stack per AGENTS.md § Verification stack — 1..9.
# Target: < 5min.
pre-push:
  parallel: false
  commands:
    full-typecheck:
      run: pnpm typecheck
    full-lint:
      # Strict gate at push time — `pnpm lint` auto-writes fixes, but
      # writes landed here wouldn't be in the pushed commit, so we
      # invoke biome directly in check-only mode.
      run: pnpm exec biome check .
    property:
      # `pnpm test:prop` runs the slow-lane vitest config
      # (`vitest.prop.config.ts`, scoped to `packages/*/prop/**/*.test.ts`).
      # Until any package ships a property suite there is nothing to run.
      run: |
        if find packages -type d -name prop 2>/dev/null | grep -q .; then
          pnpm test:prop
        else
          echo "skip: no property tests scaffolded yet"
        fi
    integration:
      # SQLite + Postgres conformance suite (ADR 0007 / §17.1).
      # Activates when `packages/db/test/integration/` exists.
      run: |
        if [ -d packages/db/test/integration ]; then
          pnpm -C packages/db test:integration
        else
          echo "skip: integration suite not yet scaffolded"
        fi
    contract:
      # Cross-surface parity matrix (§5.5).
      run: |
        if [ -d packages/contract-tests/test ]; then
          pnpm -C packages/contract-tests test
        else
          echo "skip: contract tests not yet scaffolded"
        fi
    e2e:
      # Two e2e flavours:
      #   • CLI compiled-binary ↔ real HTTP server (`apps/cli/src/e2e/
      #     *.e2e.test.ts`) — proves the `bun build --compile` artifact
      #     actually round-trips over a real TCP listener. Unlike the
      #     in-process integration tests, this spawns the shipping
      #     binary and asserts AXI stdout over a real subprocess pipe.
      #   • Playwright + axe (§17.2 step 7) — Web UI e2e in
      #     `packages/e2e`: bundled trunk + Vite dev proxy + Chromium.
      #     Requires `pnpm -C packages/e2e exec playwright install
      #     chromium` once per machine (see CONTRIBUTING).
      #
      # Both are unconditional: the packages exist and their `test:e2e`
      # scripts are authoritative. A scaffold check would be a
      # silent-skip foot-gun if someone deleted a test dir.
      #
      # `&&`-chained on purpose — lefthook runs `run: |` via sh without
      # errexit, so a multi-line block's exit code is the LAST line's
      # and a failing CLI lane would be masked whenever the Playwright
      # lane passes (adversarial review 2026-06-11, reproduced against
      # lefthook 1.13.6).
      run: pnpm -C apps/cli test:e2e && pnpm -C packages/e2e test:e2e

# ── Commit message hook: DCO sign-off enforcement ──────────────────────────
commit-msg:
  commands:
    dco-signoff:
      # Reject commits missing `Signed-off-by:` per CONTRIBUTING.md.
      run: |
        if ! grep -qE "^Signed-off-by: " "{1}"; then
          echo "ERROR: missing DCO sign-off. Use 'git commit -s'."
          exit 1
        fi
