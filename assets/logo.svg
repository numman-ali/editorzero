<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120" role="img" aria-labelledby="ez-title ez-desc">
  <title id="ez-title">editorzero</title>
  <desc id="ez-desc">editorzero — AI-native docs platform where humans and agents co-edit as peers</desc>

  <defs>
    <linearGradient id="ez-grad" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#a6c5ff"/>
      <stop offset="55%" stop-color="#5a7af4"/>
      <stop offset="100%" stop-color="#3946c9"/>
    </linearGradient>
  </defs>

  <style>
    .ez-tile-fill { fill: #0f1319; }
    .ez-tile-stroke { stroke: none; }
    .ez-fg { fill: #0f1319; }
    .ez-sub { fill: #566173; }
    @media (prefers-color-scheme: dark) {
      .ez-tile-fill { fill: #151a23; }
      .ez-tile-stroke { stroke: #2a3242; stroke-width: 1.25; }
      .ez-fg { fill: #f1f3f8; }
      .ez-sub { fill: #9ba4b6; }
    }
  </style>

  <!-- Rounded tile -->
  <rect class="ez-tile-fill ez-tile-stroke" x="10.5" y="12.5" width="95" height="95" rx="22"/>

  <!-- Soft gradient halo -->
  <circle cx="58" cy="60" r="36" fill="#5a7af4" opacity="0.18"/>
  <circle cx="58" cy="60" r="32" fill="#5a7af4" opacity="0.22"/>

  <!-- Gradient core -->
  <circle cx="58" cy="60" r="30" fill="url(#ez-grad)"/>

  <!-- Peer-merge glyph: two peer editors converging to one committed state (CRDT) -->
  <g stroke="#0b0e14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 45 48 L 58 62 L 71 48" stroke-width="4.6"/>
    <line x1="58" y1="62" x2="58" y2="76" stroke-width="4.6"/>
  </g>
  <circle cx="45" cy="48" r="3.8" fill="#0b0e14"/>
  <circle cx="71" cy="48" r="3.8" fill="#0b0e14"/>
  <circle cx="58" cy="76" r="3.6" fill="#0b0e14"/>

  <!-- Wordmark -->
  <text x="126" y="66" class="ez-fg"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="36" font-weight="800" letter-spacing="-1.2">editorzero</text>

  <!-- Tracked subtitle -->
  <text x="128" y="90" class="ez-sub"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="10.5" font-weight="700" letter-spacing="2.5">HUMAN + AGENT CO-EDITED DOCS</text>
</svg>
