packages:
  - "apps/*"
  - "packages/*"

# Frontend supply-chain posture (ADR 0035 §5). A version published fewer than
# `minimumReleaseAge` minutes ago can never resolve on a dependency bump, so a
# package that is compromised and yanked within the hour (the documented norm
# for the 2026 npm attacks, incl. the CVSS-9.6 @tanstack/* compromise) is never
# selected. 4320 = 3 days. `minimumReleaseAgeExclude` is the escape hatch for an
# urgent in-window security patch. Requires pnpm >= 10.16.0 (see `engines` +
# `packageManager`). Pins already in the lockfile are replayed unaffected; this
# governs only future version *changes*.
minimumReleaseAge: 4320
minimumReleaseAgeExclude: []

catalog:
  typescript: ^5.7.0
  "@types/node": ^22.10.0
  zod: ^4.0.0
  vitest: ^3.0.0
  "@vitest/coverage-v8": ^3.0.0
  kysely: ^0.28.16
  better-sqlite3: ^12.9.0
  "@types/better-sqlite3": ^7.6.13
  yjs: ^13.6.20
  happy-dom: ^15.11.0
  "@happy-dom/global-registrator": ^15.2.0
  # Owned editor (ADR 0038): EXACT pins, all @tiptap/* in lockstep — tiptap's
  # own packages peer-pin each other exactly, so a mixed set fails install.
  # 3.24.0 / 3.0.4 are the ADR-research-verified pair (live npm 2026-05-31);
  # 3.26.1 / 3.0.5 (published 2026-06-11) sit inside the release-age cooldown.
  # Bump the whole line together, never one package.
  "@tiptap/core": 3.24.0
  "@tiptap/extension-collaboration": 3.24.0
  "@tiptap/pm": 3.24.0
  "@tiptap/react": 3.24.0
  "@tiptap/y-tiptap": 3.0.4
  # Collab client (ADR 0038 "all @hocuspocus/* in lockstep"): the provider
  # matches the server's pinned 3.4.4 — same monorepo, same wire protocol.
  "@hocuspocus/provider": 3.4.4
  # PWA layer (ADR 0039): vite-plugin-pwa EXACT (1.3.0 published 2026-05-05,
  # past the cooldown; vite ^8 peer matches ADR 0035). workbox-build/-window
  # are its REQUIRED peers; the other workbox-* are sw.ts's own imports —
  # pin the whole family to one version so the plugin's bundler and the
  # hand-authored service worker can never skew.
  vite-plugin-pwa: 1.3.0
  workbox-build: 7.4.1
  workbox-core: 7.4.1
  workbox-precaching: 7.4.1
  workbox-routing: 7.4.1
  workbox-window: 7.4.1

# @tiptap/react declares its menu extensions as RANGED (^3.24.0) optional deps,
# so plain resolution drifts them to a newer minor that then peer-wants a newer
# core/pm — breaking the exact-lockstep rule above from inside the family.
# Force the whole family to the catalog version. We import neither component
# (BubbleMenu/FloatingMenu); the override exists for resolution coherence.
overrides:
  "@tiptap/extension-bubble-menu": 3.24.0
  "@tiptap/extension-floating-menu": 3.24.0
